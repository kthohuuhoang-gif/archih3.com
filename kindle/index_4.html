<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Viện Kindle - AH3 Portal [Trang 4/4]</title>
    <style>
        * {
            box-sizing: border-box;
        }

        /* Khóa cứng kích thước trang web khớp đúng vùng nhìn thấy của PPW5 */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #ffffff;
            color: #000000;
            font-family: serif;
        }

        body {
            padding: 3% 4%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 1. THANH TRẠNG THÁI MÔ PHỎNG KINDLE (Status Bar) */
        .status-bar {
            display: flex;
            justify-content: justify;
            align-items: center;
            font-size: 0.9rem;
            font-weight: bold;
            border-bottom: 1px solid #000000;
            padding-bottom: 6px;
        }
        
        .status-left {
            flex: 1;
            text-align: left;
        }
        
        .status-center {
            flex: 1;
            text-align: center;
            font-family: sans-serif;
            letter-spacing: 1px;
        }
        
        .status-right {
            flex: 1;
            text-align: right;
            font-size: 0.8rem;
        }

        /* 2. THANH CÔNG CỤ / LỌC SÁCH */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            font-size: 1rem;
            border-bottom: 2px solid #000000;
        }

        .filter-group {
            display: flex;
            gap: 15px;
        }

        .filter-item {
            text-decoration: none;
            color: #000000;
            font-weight: bold;
        }

        .filter-item.active {
            border-bottom: 2px solid #000000;
            padding-bottom: 2px;
        }

        /* 3. LƯỚI SÁCH (3 Cột x 2 Hàng = 6 Cuốn) */
        .books-grid {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 15px;
            align-items: center;
            padding: 15px 0;
            overflow: hidden;
        }

        /* TẬP HỢP BÌA SÁCH (Book Cover Card) */
        .book-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #000000;
            height: 100%;
            justify-content: space-between;
        }

        /* Khung bìa sách giả lập */
        .book-cover {
            width: 100%;
            max-width: 90px;
            aspect-ratio: 3 / 4;
            border: 2px solid #000000;
            padding: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            position: relative;
            box-shadow: 2px 2px 0px #000000;
        }

        .book-card:active .book-cover {
            background-color: #000000;
            color: #ffffff;
        }
        
        .book-card:active .book-cover svg * {
            stroke: #ffffff;
            fill: #ffffff;
        }

        .book-cover-title {
            font-size: 0.75rem;
            font-weight: bold;
            text-align: center;
            margin-top: 3px;
            line-height: 1.1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            max-width: 100%;
        }

        .book-title {
            font-size: 0.85rem;
            font-weight: bold;
            text-align: center;
            margin-top: 6px;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.1rem;
        }

        /* Trạng thái sách trống (Coming soon) */
        .book-cover.placeholder {
            border: 2px dashed #999999;
            box-shadow: none;
        }
        
        .book-cover.placeholder .book-cover-title {
            color: #999999;
        }

        /* 4. THANH PHÂN TRANG CHÂN TRANG */
        .footer-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid #000000;
            padding-top: 12px;
        }

        .nav-btn {
            display: inline-block;
            padding: 8px 16px;
            border: 2px solid #000000;
            text-decoration: none;
            color: #000000;
            font-weight: bold;
            font-size: 0.95rem;
            text-transform: uppercase;
        }

        .nav-btn.disabled {
            color: #999999;
            border-color: #999999;
            pointer-events: none;
        }

        .page-indicator {
            font-size: 0.95rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 1. THANH TRẠNG THÁI MÔ PHỎNG KINDLE -->
    <div class="status-bar">
        <span class="status-left">AH3 Library</span>
        <span class="status-center">11:30 AM</span>
        <span class="status-right">📶 🔋 98%</span>
    </div>

    <!-- 2. THANH CÔNG CỤ / LỌC -->
    <div class="toolbar">
        <div class="filter-group">
            <span class="filter-item active">Phương Trình Đẹp (20)</span>
            <span class="filter-item" style="color: #999999;">Kho lưu trữ</span>
        </div>
        <div style="font-weight: bold;">
            Trang 4/4
        </div>
    </div>

    <!-- 3. LƯỚI BÌA SÁCH (6 cuốn mỗi trang) -->
    <div class="books-grid">
        
        <!-- Sách 19: 19. Phương Trình Black-Scholes -->
        <a href="eq19.html" class="book-card">
            <div class="book-cover">
                <svg viewBox="0 0 100 80" width="100%" height="55">
                    <path d="M20,60 L40,40 L60,45 L80,25" fill="none" stroke="#000000" stroke-width="2" />
                    <circle cx="80" cy="25" r="3" fill="#000000" />
                </svg>
                <div class="book-cover-title">PHƯƠNG TRÌNH BLACK-SCHOLES</div>
            </div>
            <div class="book-title">19. Phương Trình Black-Scholes</div>
        </a>

        <!-- Sách 20: 20. Bản Đồ Logistic Map -->
        <a href="eq20.html" class="book-card">
            <div class="book-cover">
                <svg viewBox="0 0 100 80" width="100%" height="55">
                    <path d="M10,60 C20,20 40,65 60,35 C70,20 80,60 90,40" fill="none" stroke="#000000" stroke-width="2" />
                </svg>
                <div class="book-cover-title">BẢN ĐỒ LOGISTIC MAP</div>
            </div>
            <div class="book-title">20. Bản Đồ Logistic Map</div>
        </a>

        <!-- Ô trống giữ chỗ -->
        <div class="book-card" style="pointer-events: none;">
            <div class="book-cover placeholder">
                <svg viewBox="0 0 100 80" width="100%" height="55">
                    <text x="50" y="55" font-family="sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#999999">?</text>
                </svg>
                <div class="book-cover-title">SẮP CÓ</div>
            </div>
            <div class="book-title" style="color: #999999;">Đang cập nhật...</div>
        </div>

    </div>

    <!-- 4. THANH PHÂN TRANG CHÂN TRANG -->
    <div class="footer-nav">
        <a href="../index.html" class="nav-btn">← Portal</a>
        
        <div class="page-indicator">
            Trang 4 / 4
        </div>
        
        <div style="display: flex; gap: 10px;">
            <a href="index_3.html" class="nav-btn ">&lt;</a>
            <a href="#" class="nav-btn disabled">&gt;</a>
        </div>
    </div>

</body>
</html>
