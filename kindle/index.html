<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mục Lục - Thư Viện Phương Trình Kindle</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        /* Đảm bảo khung HTML/Body chiếm chính xác 100% vùng nhìn thấy thực tế */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            padding: 4% 5%;
            background-color: #ffffff;
            color: #000000;
            font-family: serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #000000;
            padding-bottom: 8px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .menu-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
            padding: 15px 0;
            overflow: hidden;
        }

        .menu-title {
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .menu-item {
            display: block;
            padding: 15px;
            border: 2px solid #000000;
            text-decoration: none;
            color: #000000;
            font-weight: bold;
            font-size: 1.15rem;
            text-align: center;
            background-color: #ffffff;
        }

        .menu-item:active {
            background-color: #000000;
            color: #ffffff;
        }

        /* Thanh điều hướng chân trang */
        .footer {
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 2px solid #000000;
            padding-top: 10px;
        }

        .footer-btn {
            display: inline-block;
            padding: 10px 20px;
            border: 2px solid #000000;
            text-decoration: none;
            color: #000000;
            font-weight: bold;
            font-size: 0.95rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header">
        THƯ VIỆN PHƯƠNG TRÌNH
    </div>

    <div class="menu-container">
        <div class="menu-title">Danh sách bài đọc</div>
        
        <a href="pytago.html" class="menu-item">
            1. Định lý Pytago (Hình học)
        </a>
        
        <a href="emc2.html" class="menu-item">
            2. Thuyết tương đối hẹp (Vật lý)
        </a>
    </div>

    <div class="footer">
        <a href="../index.html" class="footer-btn">← Về trang chủ AH3</a>
    </div>

</body>
</html>
